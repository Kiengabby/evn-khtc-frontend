<div class="login-page">
      <div class="login-left">
        <div class="brand-area">
          <img src="assets/images/evn.png" alt="EVN" class="brand-logo">
          <h2>Hệ thống Kế hoạch<br>Tài chính EVN</h2>
          <p>Nền tảng quản lý kế hoạch tài chính, dự báo ngân sách
            và phê duyệt dành cho Tập đoàn Điện lực Việt Nam</p>
        </div>
      </div>

      <div class="login-right">
        <div class="login-card">
          <div class="login-header">
            <img src="assets/images/evn2.png" alt="EVN" class="login-logo">
            <h1>Đăng nhập</h1>
            <p>Nhập thông tin tài khoản để tiếp tục</p>
          </div>

          <form class="login-form" (ngSubmit)="onLogin()">
            <div class="form-group">
              <label for="username">Tên đăng nhập</label>
              <div class="input-wrap">
                <i class="pi pi-user"></i>
                <input id="username" type="text" [(ngModel)]="username" name="username"
                       placeholder="Nhập tên đăng nhập" autocomplete="username" required>
              </div>
            </div>

            <div class="form-group">
              <label for="password">Mật khẩu</label>
              <div class="input-wrap">
                <i class="pi pi-lock"></i>
                <input id="password" type="password" [(ngModel)]="password" name="password"
                       placeholder="Nhập mật khẩu" autocomplete="current-password" required>
              </div>
            </div>

            @if (errorMessage) {
              <div class="error-msg">
                <i class="pi pi-exclamation-circle"></i>
                {{ errorMessage }}
              </div>
            }

            <button type="submit" class="login-btn" [disabled]="loading">
              @if (loading) { <i class="pi pi-spin pi-spinner"></i> }
              Đăng nhập
            </button>
          </form>

          <p class="footer-text">© 2026 Tập đoàn Điện lực Việt Nam</p>
        </div>
      </div>
    </div>
